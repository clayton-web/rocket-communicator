components:
  parameters:
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong ETag from the current resource version.
      schema:
        type: string
        pattern: '^"(task|task-suggestion)-[^"]+-v[0-9]+"$'
      example: '"task-01JXYZ-v3"'
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
