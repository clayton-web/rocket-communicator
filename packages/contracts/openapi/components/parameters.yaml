components:
  parameters:
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong ETag from the current resource version.
      schema:
        type: string
        pattern: '^"(task|task-suggestion)-[^"]+-v[0-9]+"$'
      example: '"task-01JXYZ-v3"'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated idempotency key for safe retries of side-effecting Owner mutations (D094).
        Introduced for A7 handoff; reuse the same key only with an identical request payload for the
        same operation and resource. Replay of a completed success returns the original success body
        with `idempotentReplay: true`. Reuse with a conflicting payload returns 409 IDEMPOTENCY_KEY_CONFLICT.
        Missing header → 428 PRECONDITION_REQUIRED.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: '^[A-Za-z0-9._~-]+$'
      example: 'handoff-01JXYZ-attempt-1'
    CapabilityToken:
      name: token
      in: path
      required: true
      description: |
        Raw capability secret authorizing scoped Recipient access (D050, D059).
        This path parameter is the Recipient authorization surface (not bearerAuth).
        Capability routes set `security: []` because OpenAPI cannot model path-based
        apiKey schemes. Store only a hash server-side; never log the raw secret (D063).
      schema:
        type: string
        minLength: 32
        maxLength: 256
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    RecipientId:
      name: recipientId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque pagination cursor from a prior response `nextCursor`.
        For `GET /api/v1/tasks`, the cursor represents composite order
        `updatedAt` DESC, then `id` DESC.
      schema:
        type: string
        maxLength: 256
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
