components:
  schemas:
    AuthenticatedRole:
      type: string
      enum:
        - owner
      description: The only authenticated application role in version one (D048).
    Session:
      type: object
      required:
        - ownerId
        - organizationId
        - role
      properties:
        ownerId:
          type: string
          minLength: 1
          maxLength: 64
          description: Authenticated Owner user identifier.
        organizationId:
          type: string
          minLength: 1
          maxLength: 64
        role:
          $ref: '#/components/schemas/AuthenticatedRole'
        displayName:
          type: string
          maxLength: 128
