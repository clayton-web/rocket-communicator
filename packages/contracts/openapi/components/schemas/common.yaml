components:
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - INVALID_STATE_TRANSITION
        - PRECONDITION_REQUIRED
        - PRECONDITION_FAILED
        - DOMAIN_CONFLICT
        - RATE_LIMITED
        - DEPENDENCY_UNAVAILABLE
        - RECIPIENT_HANDOFF_NOT_AVAILABLE
        - CAPABILITY_NO_LONGER_ACTIVE
        - IDEMPOTENCY_KEY_CONFLICT
        - HANDOFF_NOT_ELIGIBLE
        - RECIPIENT_INACTIVE
        - GMAIL_NOT_CONNECTED
        - GMAIL_SEND_SCOPE_REQUIRED
        - GMAIL_SOURCE_UNAVAILABLE
        - HANDOFF_INCOMPLETE_FORWARD_PROHIBITED
        - HANDOFF_DELIVERY_FAILED
        - HANDOFF_IN_PROGRESS
        - INTERNAL_ERROR
      description: |
        Public API error codes. Prefer reusing existing codes when semantics match.
        A7 handoff-specific codes:
        - CAPABILITY_NO_LONGER_ACTIVE — token positively matched a stored capability whose
          internal revocation reason is superseded (re-forward/reassignment, D086). Must not
          disclose replacement capability, Task, Assignment, Recipient, or other identifying state.
          Manual revocation, assignment-ended revocation, expiration, and unknown/malformed/
          missing/unmatched tokens remain UNAUTHORIZED (probing-safe). Internal revocation
          reasons are persistence/audit data and are not generally exposed.
        - IDEMPOTENCY_KEY_CONFLICT — same Idempotency-Key reused with a different request payload.
        - HANDOFF_NOT_ELIGIBLE — Task/self-work not eligible for Recipient handoff.
        - RECIPIENT_INACTIVE — Recipient exists but is inactive (D087).
        - GMAIL_NOT_CONNECTED / GMAIL_SEND_SCOPE_REQUIRED / GMAIL_SOURCE_UNAVAILABLE — Gmail prerequisites.
        - HANDOFF_INCOMPLETE_FORWARD_PROHIBITED — D088 incomplete forward blocked before send.
        - HANDOFF_DELIVERY_FAILED — outbound send attempted and failed (retryable provider failure).
        - HANDOFF_IN_PROGRESS — durable attempt already running for this handoff/idempotency key.
        RECIPIENT_HANDOFF_NOT_AVAILABLE remains the A6 suggestion-approve rejection when recipientId is present (D080).
    ErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          maxLength: 128
        message:
          type: string
          maxLength: 256
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - requestId
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
              maxLength: 512
            details:
              type: array
              maxItems: 20
              items:
                $ref: '#/components/schemas/ErrorDetail'
            requestId:
              type: string
              format: uuid
            correlationId:
              type:
                - string
                - 'null'
              format: uuid
    VersionedResource:
      type: object
      required:
        - version
        - etag
      properties:
        version:
          type: integer
          minimum: 1
        etag:
          type: string
          description: Strong HTTP ETag value including quotes.
    Timestamps:
      type: object
      required:
        - createdAt
        - updatedAt
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CursorPage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
        nextCursor:
          type:
            - string
            - 'null'
          maxLength: 256
          description: |
            Opaque cursor for the next page, or null when exhausted.
            For task lists, encodes composite order `updatedAt` DESC, `id` DESC.
