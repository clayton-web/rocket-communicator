components:
  schemas:
    CapabilityAction:
      type: string
      enum:
        - view_assigned_task
        - complete_task
        - mark_task_waiting
        - add_task_note
        - record_completion_outcome
        - return_task_to_owner
        - request_clarification
      description: Actions a task capability link may authorize. Owner-only actions are excluded.
    CapabilityStatus:
      type: string
      enum:
        - active
        - revoked
        - expired
        - used
      description: Lifecycle status of a task capability. Raw token values are never exposed.
    CapabilityScope:
      type: array
      minItems: 1
      maxItems: 7
      uniqueItems: true
      items:
        $ref: '#/components/schemas/CapabilityAction'
      description: Allowed actions for a specific task capability link.
    AssignmentDeliveryStatus:
      type: string
      enum:
        - pending
        - sent
        - failed
      description: Placeholder for assignment email delivery tracking (implementation deferred).
    TaskCapability:
      type: object
      required:
        - id
        - taskId
        - assignmentId
        - intendedRecipientEmail
        - scope
        - status
        - issuedAt
        - expiresAt
      properties:
        id:
          type: string
          maxLength: 64
          description: Capability identifier. Raw token is stored only as a secure hash server-side.
        taskId:
          type: string
          maxLength: 64
        assignmentId:
          type: string
          maxLength: 64
        recipientId:
          type: string
          maxLength: 64
        intendedRecipientEmail:
          type: string
          format: email
          maxLength: 254
          description: Intended recipient at issuance. Not verified actor identity.
        scope:
          $ref: '#/components/schemas/CapabilityScope'
        status:
          $ref: '#/components/schemas/CapabilityStatus'
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type:
            - string
            - 'null'
          format: date-time
        lastUsedAt:
          type:
            - string
            - 'null'
          format: date-time
    CapabilityAuditContext:
      type: object
      required:
        - capabilityId
        - assignmentId
        - taskId
        - intendedRecipientEmail
        - action
        - recordedAt
      properties:
        capabilityId:
          type: string
          maxLength: 64
        assignmentId:
          type: string
          maxLength: 64
        taskId:
          type: string
          maxLength: 64
        intendedRecipientEmail:
          type: string
          format: email
          maxLength: 254
          description: Intended recipient for the link. Not verified actor identity.
        action:
          $ref: '#/components/schemas/CapabilityAction'
        recordedAt:
          type: string
          format: date-time
        note:
          type: string
          maxLength: 2000
        requestId:
          type: string
          maxLength: 64
        correlationId:
          type:
            - string
            - 'null'
          maxLength: 64
        attributionLabel:
          type: string
          maxLength: 256
          description: |
            Human-readable audit wording such as "Action submitted through link sent to recipient@example.com".
            Must not claim a verified person performed the action.
    OwnerAuditContext:
      type: object
      required:
        - ownerId
        - recordedAt
      properties:
        ownerId:
          type: string
          maxLength: 64
        recordedAt:
          type: string
          format: date-time
        requestId:
          type: string
          maxLength: 64
        correlationId:
          type:
            - string
            - 'null'
          maxLength: 64
    ActionAttribution:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - owner
            - capability
        owner:
          $ref: '#/components/schemas/OwnerAuditContext'
        capability:
          $ref: '#/components/schemas/CapabilityAuditContext'
