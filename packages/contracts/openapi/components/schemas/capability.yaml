components:
  schemas:
    CapabilityAction:
      type: string
      enum:
        - view_assigned_task
        - complete_task
        - mark_task_waiting
        - add_task_note
        - record_completion_outcome
        - return_task_to_owner
        - request_clarification
        - submit_work_request
      description: Actions a task capability link may authorize. Owner-only actions are excluded.
    CapabilityStatus:
      type: string
      enum:
        - active
        - revoked
        - expired
        - used
      description: |
        Lifecycle status of a task capability. Raw token values are never exposed.
        Active capabilities are multi-use until expiry, revocation, assignment
        replacement/removal, or other terminal invalidation (D056). The `used` enum value
        is reserved and must not be assigned transition semantics without a Decision.
        Under D086, reassignment or re-forward revokes the prior active capability (`revoked`)
        with an internal supersession reason. Only a positively matched capability with that
        supersession reason may surface CAPABILITY_NO_LONGER_ACTIVE; manual revocation,
        assignment-ended revocation, expiration, and unknown/unmatched tokens remain UNAUTHORIZED.
        Internal revocation reasons are not generally exposed on public error envelopes.
    CapabilityScope:
      type: array
      minItems: 1
      maxItems: 8
      uniqueItems: true
      items:
        $ref: '#/components/schemas/CapabilityAction'
      description: Allowed actions for a specific task capability link.
    AssignmentDeliveryStatus:
      type: string
      enum:
        - pending
        - sent
        - failed
      description: |
        Outbound assignment/forward delivery outcome for an Assignment (D092).
        This is a real delivery model (not a deferred placeholder).
        - `pending` — delivery not yet accepted by Gmail; must **not** expose an actionable Recipient capability.
        - `sent` — Gmail **accepted** the outbound send (forward or assignment email). Does **not** mean the human Recipient opened or read the message.
        - `failed` — delivery attempt failed; must **not** expose an actionable Recipient capability; Owner may retry per D086/D092.
        Detailed delivery-attempt history may be represented by a dedicated resource in later A7 phases without overloading Assignment semantics.
    TaskCapability:
      type: object
      required:
        - id
        - taskId
        - assignmentId
        - intendedRecipientEmail
        - scope
        - status
        - issuedAt
        - expiresAt
      properties:
        id:
          type: string
          maxLength: 64
          description: Capability identifier. Raw token is stored only as a secure hash server-side.
        taskId:
          type: string
          maxLength: 64
        assignmentId:
          type: string
          maxLength: 64
        recipientId:
          type: string
          maxLength: 64
        intendedRecipientEmail:
          type: string
          format: email
          maxLength: 254
          description: Intended recipient at issuance. Not verified actor identity.
        scope:
          $ref: '#/components/schemas/CapabilityScope'
        status:
          $ref: '#/components/schemas/CapabilityStatus'
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type:
            - string
            - 'null'
          format: date-time
        lastUsedAt:
          type:
            - string
            - 'null'
          format: date-time
    CapabilityAuditContext:
      type: object
      required:
        - capabilityId
        - assignmentId
        - taskId
        - intendedRecipientEmail
        - action
        - recordedAt
        - outcome
      properties:
        capabilityId:
          type: string
          maxLength: 64
        assignmentId:
          type: string
          maxLength: 64
        taskId:
          type: string
          maxLength: 64
        intendedRecipientEmail:
          type: string
          format: email
          maxLength: 254
          description: Intended recipient for the link. Not verified actor identity.
        action:
          $ref: '#/components/schemas/CapabilityAction'
        recordedAt:
          type: string
          format: date-time
        outcome:
          type: string
          enum:
            - succeeded
            - denied
            - failed
          description: Result of the authorization/mutation attempt for audit (D057).
        resourceVersion:
          type: integer
          minimum: 1
          description: Task version observed or written for state/version context (D057).
        taskStatus:
          type: string
          maxLength: 64
          description: Task status context for audit (D057).
        note:
          type: string
          maxLength: 2000
        requestId:
          type: string
          maxLength: 64
        correlationId:
          type:
            - string
            - 'null'
          maxLength: 64
        attributionLabel:
          type: string
          maxLength: 256
          description: |
            Human-readable audit wording such as "Action submitted through link sent to recipient@example.com".
            Must not claim a verified person performed the action.
    IssuedCapabilityLink:
      type: object
      required:
        - capabilityId
        - taskId
        - assignmentId
        - expiresAt
        - token
        - capabilityPath
      properties:
        capabilityId:
          type: string
          maxLength: 64
        taskId:
          type: string
          maxLength: 64
        assignmentId:
          type: string
          maxLength: 64
        expiresAt:
          type: string
          format: date-time
        token:
          type: string
          minLength: 32
          maxLength: 256
          description: |
            Raw capability secret returned once to the authenticated Owner for manual verification (D063).
            Never persisted in plaintext; never write this value to application logs.
        capabilityPath:
          type: string
          maxLength: 512
          description: Relative browser path such as /c/{token} for Owner-assisted A4 testing.
    SubmitWorkRequestRequest:
      type: object
      required:
        - message
        - confirmation
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
          description: Typed Recipient work request body (D058).
        confirmation:
          type: string
          enum:
            - confirmed
          description: Explicit POST confirmation that the Recipient intends to submit the work request (D050).
    SubmitWorkRequestResponse:
      type: object
      required:
        - suggestion
      properties:
        suggestion:
          $ref: './task-suggestion.yaml#/components/schemas/TaskSuggestion'
        task:
          $ref: './task.yaml#/components/schemas/Task'
    CapabilityConfirmation:
      type: object
      required:
        - confirmation
      properties:
        confirmation:
          type: string
          enum:
            - confirmed
          description: Explicit Recipient POST confirmation (D050).
    OwnerAuditContext:
      type: object
      required:
        - ownerId
        - recordedAt
      properties:
        ownerId:
          type: string
          maxLength: 64
        recordedAt:
          type: string
          format: date-time
        requestId:
          type: string
          maxLength: 64
        correlationId:
          type:
            - string
            - 'null'
          maxLength: 64
    ActionAttribution:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - owner
            - capability
        owner:
          $ref: '#/components/schemas/OwnerAuditContext'
        capability:
          $ref: '#/components/schemas/CapabilityAuditContext'
