components:
  schemas:
    TaskStatus:
      type: string
      enum:
        - open
        - in_progress
        - waiting
        - completed
        - dismissed
    DerivedTaskUrgency:
      type: string
      enum:
        - due_soon
        - overdue
    Task:
      type: object
      required:
        - id
        - organizationId
        - status
        - summaryPoints
        - version
        - etag
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          maxLength: 64
        organizationId:
          type: string
          maxLength: 64
        status:
          $ref: '#/components/schemas/TaskStatus'
        priorActionableStatus:
          description: Preserved actionable status before entering waiting.
          oneOf:
            - $ref: '#/components/schemas/TaskStatus'
            - type: 'null'
        summaryPoints:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        assignment:
          $ref: './assignment.yaml#/components/schemas/TaskAssignment'
        sourceReference:
          $ref: './source-reference.yaml#/components/schemas/SourceReference'
        dueAt:
          type:
            - string
            - 'null'
          format: date-time
        waitingUntil:
          type:
            - string
            - 'null'
          format: date-time
        priority:
          $ref: './assignment.yaml#/components/schemas/TaskPriority'
        derivedUrgency:
          description: Derived at read time; never persisted.
          oneOf:
            - $ref: '#/components/schemas/DerivedTaskUrgency'
            - type: 'null'
        outcome:
          $ref: './outcome.yaml#/components/schemas/TaskOutcome'
        notes:
          type: array
          maxItems: 100
          items:
            $ref: './note.yaml#/components/schemas/TaskNote'
        reminder:
          $ref: './reminder-retention.yaml#/components/schemas/ReminderMetadata'
        retention:
          $ref: './reminder-retention.yaml#/components/schemas/RetentionMetadata'
        version:
          type: integer
          minimum: 1
        etag:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTaskRequest:
      type: object
      required:
        - summaryPoints
      properties:
        summaryPoints:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        recipientId:
          type: string
          maxLength: 64
          deprecated: true
          description: |
            **Deprecated (D091).** Silent create-with-assignment path retained for A4 compatibility
            until A7 handoff implementation rejects it. New clients must create an **unassigned** Task
            and call `POST /api/v1/tasks/{taskId}/handoff`. Suggestion approval already produces
            unassigned Tasks only (D080). Do not treat this field as the recommended assignment path.
        dueAt:
          type: string
          format: date-time
        priority:
          $ref: './assignment.yaml#/components/schemas/TaskPriority'
        sourceReference:
          $ref: './source-reference.yaml#/components/schemas/SourceReference'
      description: |
        Owner typed Task creation. Creates an unassigned Task unless deprecated `recipientId` is
        supplied (legacy A4 behaviour). Task creation and Recipient handoff are distinct operations (D091).
    MarkTaskWaitingRequest:
      type: object
      required:
        - waitingUntil
      properties:
        waitingUntil:
          type: string
          format: date-time
        reason:
          type: string
          maxLength: 500
    CompleteTaskRequest:
      type: object
      required:
        - outcomeType
      properties:
        outcomeType:
          $ref: './outcome.yaml#/components/schemas/TaskOutcomeType'
        note:
          type: string
          maxLength: 2000
        summaryPoints:
          type: array
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        followUpProposal:
          $ref: './follow-up.yaml#/components/schemas/FollowUpProposal'
    AddTaskNoteRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
    ReturnTaskToOwnerRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 2000
    RequestClarificationRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
    SnoozeTaskRequest:
      type: object
      required:
        - nextReminderAt
      properties:
        nextReminderAt:
          type: string
          format: date-time
          description: Owner-requested next reminder instant after snooze (D060).
        reason:
          type: string
          maxLength: 500
    DismissTaskRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    IssueTaskCapabilityRequest:
      type: object
      properties:
        scope:
          $ref: './capability.yaml#/components/schemas/CapabilityScope'
          description: Optional override of default Recipient scope for the assignment.
