components:
  schemas:
    TaskNote:
      type: object
      required:
        - id
        - attribution
        - body
        - createdAt
      properties:
        id:
          type: string
          maxLength: 64
        attribution:
          $ref: './capability.yaml#/components/schemas/ActionAttribution'
        body:
          type: string
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
