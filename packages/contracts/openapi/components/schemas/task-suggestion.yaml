components:
  schemas:
    TaskSuggestionStatus:
      type: string
      enum:
        - pending
        - approved
        - dismissed
        - merged
    TaskSuggestion:
      type: object
      required:
        - id
        - organizationId
        - status
        - summaryPoints
        - version
        - etag
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          maxLength: 64
        organizationId:
          type: string
          maxLength: 64
        status:
          $ref: '#/components/schemas/TaskSuggestionStatus'
        summaryPoints:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        sourceReference:
          $ref: './source-reference.yaml#/components/schemas/SourceReference'
        proposedRecipientId:
          type:
            - string
            - 'null'
          maxLength: 64
          description: |
            Optional AI- or work-request-proposed Recipient. Informational in A6.
            Approving with recipientId is rejected (D080); Recipient handoff is A7 (D037).
        proposedDueAt:
          type:
            - string
            - 'null'
          format: date-time
        proposedPriority:
          $ref: './assignment.yaml#/components/schemas/TaskPriority'
        voiceOriginated:
          type: boolean
          default: false
        mergedIntoTaskId:
          type:
            - string
            - 'null'
          maxLength: 64
        retention:
          $ref: './reminder-retention.yaml#/components/schemas/RetentionMetadata'
        version:
          type: integer
          minimum: 1
        etag:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ApproveTaskSuggestionRequest:
      type: object
      required:
        - acknowledgement
      properties:
        summaryPoints:
          type: array
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        recipientId:
          type: string
          maxLength: 64
          description: |
            Must not be sent in A6. If present, the server returns HTTP 400 with
            error code RECIPIENT_HANDOFF_NOT_AVAILABLE (D080). Recipient assignment,
            capability issuance, assignment email, and Gmail forward remain A7 (D037).
        priority:
          $ref: './assignment.yaml#/components/schemas/TaskPriority'
        dueAt:
          type: string
          format: date-time
        acknowledgement:
          type: string
          enum:
            - suggestion_approved
          description: |
            Owner confirms creating an unassigned Task from this suggestion (D080).
            Does not approve Recipient assignment, capability issuance, assignment email,
            Gmail forward, or reminder scheduling.
    EditTaskSuggestionRequest:
      type: object
      properties:
        summaryPoints:
          type: array
          maxItems: 20
          items:
            $ref: './summary-point.yaml#/components/schemas/TaskSummaryPoint'
        proposedRecipientId:
          type:
            - string
            - 'null'
          maxLength: 64
        proposedDueAt:
          type:
            - string
            - 'null'
          format: date-time
        proposedPriority:
          $ref: './assignment.yaml#/components/schemas/TaskPriority'
    DismissTaskSuggestionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    MergeTaskSuggestionRequest:
      type: object
      required:
        - targetTaskId
        - targetTaskIfMatch
      properties:
        targetTaskId:
          type: string
          maxLength: 64
        targetTaskIfMatch:
          type: string
          description: |
            Strong ETag of the target Task (including quotes), matching D045 / VersionedResource.etag.
            Required in addition to the suggestion If-Match header (D083).
        appendSummaryPoints:
          type: boolean
          default: true
    SuggestionProcessResponse:
      type: object
      required:
        - claimed
        - skippedIrrelevant
        - suggestionsCreated
        - failedRetryable
        - failedPermanent
        - requestId
      properties:
        claimed:
          type: integer
          minimum: 0
          description: Events successfully claim-leased in this invocation.
        skippedIrrelevant:
          type: integer
          minimum: 0
          description: Events marked skipped_irrelevant by heuristic relevance (no suggestion).
        suggestionsCreated:
          type: integer
          minimum: 0
          description: Pending TaskSuggestions created via LLM extraction.
        failedRetryable:
          type: integer
          minimum: 0
          description: Events left or set to failed_retryable (no suggestion created).
        failedPermanent:
          type: integer
          minimum: 0
          description: Events set to failed_permanent (no suggestion created).
        requestId:
          type: string
          maxLength: 64
      description: |
        Aggregate suggestion-processing outcome (D084, D085). No raw communication bodies,
        excerpts, tokens, or per-message content.
