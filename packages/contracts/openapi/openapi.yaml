openapi: 3.1.0
info:
  title: AI Communication Action Assistant API
  version: 0.1.0
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  description: |
    Canonical HTTP contract for the AI Communication Action Assistant.
    OpenAPI is the source of truth (D007). A3 Owner session authentication and A4
    Owner task + Recipient capability routes are implemented and production-verified.
    A5 Gmail OAuth, History sync, and internal poll are implemented and production-operational.
    A6 Owner task-suggestion HTTP and internal suggestion processing are contracted
    (handlers in A6 implementation phases; D080–D085). Owner and capability authorization
    surfaces are separate (D059).
servers:
  - url: https://api.example.invalid
    description: Placeholder server URL for contract generation only
tags:
  - name: Session
    description: Authenticated Owner session shape (A3).
  - name: TaskSuggestions
    description: |
      Pre-task proposals requiring Owner approval (A6). Includes Owner suggestion HTTP
      and internal suggestion processing (D080–D085). Does not create Recipient handoffs.
  - name: Tasks
    description: Owner-authorized actionable work items.
  - name: Capabilities
    description: Recipient capability-token routes (separate from Owner session APIs).
  - name: Gmail
    description: |
      Owner Gmail connection and sync (A5). OAuth, manual sync, History ingestion, and
      internal poll are implemented and production-operational. Does not create Task
      Suggestions (D077). Internal poll uses InternalCronBearer (CRON_SECRET), not Owner session.
security:
  - bearerAuth: []
