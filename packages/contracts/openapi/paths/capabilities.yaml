paths:
  /api/v1/capabilities/{token}/tasks/{taskId}:
    get:
      operationId: getCapabilityTask
      tags: [Capabilities]
      summary: Non-mutating Recipient task view
      description: |
        GET must not mutate task, assignment, or capability state (D050, D059).
        Knowledge of `{token}` authorizes view when the capability is active and in scope.
      security: []
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/CapabilityToken'
        - $ref: '../components/parameters.yaml#/components/parameters/TaskId'
      responses:
        '200':
          description: Task view for the capability holder
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Task'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../components/responses.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../components/responses.yaml#/components/responses/NotFound'
  /api/v1/capabilities/{token}/tasks/{taskId}/waiting:
    post:
      operationId: markCapabilityTaskWaiting
      tags: [Capabilities]
      summary: Mark waiting via capability (POST after confirm)
      security: []
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/CapabilityToken'
        - $ref: '../components/parameters.yaml#/components/parameters/TaskId'
        - $ref: '../components/parameters.yaml#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../openapi.yaml#/components/schemas/MarkTaskWaitingRequest'
                - $ref: '../openapi.yaml#/components/schemas/CapabilityConfirmation'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Task'
        '400':
          $ref: '../components/responses.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../components/responses.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../components/responses.yaml#/components/responses/NotFound'
        '409':
          $ref: '../components/responses.yaml#/components/responses/Conflict'
        '412':
          $ref: '../components/responses.yaml#/components/responses/PreconditionFailed'
        '428':
          $ref: '../components/responses.yaml#/components/responses/PreconditionRequired'
  /api/v1/capabilities/{token}/tasks/{taskId}/resume:
    post:
      operationId: resumeCapabilityTask
      tags: [Capabilities]
      summary: Resume waiting via capability (POST after confirm)
      security: []
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/CapabilityToken'
        - $ref: '../components/parameters.yaml#/components/parameters/TaskId'
        - $ref: '../components/parameters.yaml#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CapabilityConfirmation'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Task'
        '400':
          $ref: '../components/responses.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../components/responses.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../components/responses.yaml#/components/responses/NotFound'
        '409':
          $ref: '../components/responses.yaml#/components/responses/Conflict'
        '412':
          $ref: '../components/responses.yaml#/components/responses/PreconditionFailed'
        '428':
          $ref: '../components/responses.yaml#/components/responses/PreconditionRequired'
  /api/v1/capabilities/{token}/tasks/{taskId}/complete:
