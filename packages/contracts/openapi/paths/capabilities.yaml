  /api/v1/capabilities/{token}/tasks/{taskId}/work-requests:
    post:
      operationId: submitCapabilityWorkRequest
      tags: [Capabilities]
      summary: Submit typed work request as a pending Task Suggestion
      description: |
        Creates a pending Task Suggestion for Owner approval (D061). Does not create a Task.
        Typed-only in A4 (D058). Multi-use capability remains valid after success (D056).
      security: []
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/CapabilityToken'
        - $ref: '../components/parameters.yaml#/components/parameters/TaskId'
        - $ref: '../components/parameters.yaml#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SubmitWorkRequestRequest'
      responses:
