paths:
  /api/v1/tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List tasks
      description: |
        Returns organization-scoped tasks for the authenticated Owner.

        **Ordering:** `updatedAt` descending, then `id` descending as the deterministic tie-breaker.

        **Cursor:** Opaque `cursor` / `nextCursor` values encode that composite ordering
        (`updatedAt` DESC, `id` DESC). Pass `nextCursor` as `cursor` to fetch the next page.

        **Statuses:** All persisted statuses are included, including `dismissed`. There is no
        status filter on this endpoint; a future contracted filter would be required to exclude
        dismissed (or other) statuses.
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/Cursor'
        - $ref: '../components/parameters.yaml#/components/parameters/Limit'
      responses:
        '200':
          description: |
            Paginated tasks in `updatedAt` DESC, `id` DESC order. Includes dismissed tasks.
            `nextCursor` is null when no further pages exist.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../openapi.yaml#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '../openapi.yaml#/components/schemas/Task'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
    post:
      operationId: createTask
      tags: [Tasks]
      summary: Create a task directly (Owner typed creation only)
      description: |
        Creates an Owner-owned Task. Prefer creating **unassigned** Tasks; Recipient handoff is a
        separate operation `POST /api/v1/tasks/{taskId}/handoff` (D090, D091).
        Optional `recipientId` on CreateTaskRequest is **deprecated** and will be rejected when
        A7 handoff implementation ships — do not use it for new clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Task'
        '400':
          $ref: '../components/responses.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../components/responses.yaml#/components/responses/Forbidden'
