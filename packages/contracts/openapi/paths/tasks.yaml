        '403':
          $ref: '../components/responses.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../components/responses.yaml#/components/responses/NotFound'
        '412':
          $ref: '../components/responses.yaml#/components/responses/PreconditionFailed'
        '428':
          $ref: '../components/responses.yaml#/components/responses/PreconditionRequired'
