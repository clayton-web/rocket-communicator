paths:
  /api/v1/gmail/connection:
    get:
      operationId: getGmailConnection
      tags: [Gmail]
      summary: Get Owner Gmail connection status
      description: |
        Returns safe connection status for the authenticated Owner organization.
        **Status: Implemented in A5.3.** Never returns tokens, ciphertext, or OAuth secrets.
      responses:
        '200':
          description: Current Gmail connection status
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/GmailConnection'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
  /api/v1/gmail/oauth/start:
    post:
      operationId: startGmailOAuth
      tags: [Gmail]
      summary: Start Gmail OAuth (redirect)
      description: |
        Starts Owner Gmail OAuth with gmail.readonly only (D070). Uses hashed state +
        encrypted PKCE. Creates a durable one-time state record and may emit an audit event;
        therefore this is POST (not GET) to prevent prefetch/crawler accidental starts.
        Redirects to Google. Raw state and PKCE verifier are never returned in JSON.
        **Status: Implemented in A5.3.**
      parameters:
        - name: returnPath
          in: query
          required: false
          description: Optional same-origin absolute return path (allowlisted server-side).
          schema:
            type: string
            maxLength: 512
      responses:
        '200':
          description: |
            Not returned on success. Documented for OpenAPI lint completeness;
            successful starts redirect with 302.
        '302':
          description: Redirect to Google authorization endpoint
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '409':
          $ref: '../components/responses.yaml#/components/responses/Conflict'
  /api/v1/gmail/oauth/callback:
    get:
      operationId: gmailOAuthCallback
      tags: [Gmail]
      summary: Gmail OAuth callback (redirect)
      description: |
        Exchanges authorization code, verifies Workspace mailbox domain (D069),
        persists encrypted credentials. Redirects to Owner UI with safe error codes
        on failure. Never exposes tokens in query or body.
        Protected by state + PKCE; does not rely solely on the Supabase Owner session.
        **Status: Implemented in A5.3.**
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
            maxLength: 2048
        - name: state
          in: query
          required: false
          schema:
            type: string
            maxLength: 512
        - name: error
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: |
            Not returned on success. Documented for OpenAPI lint completeness;
            successful callbacks redirect with 302 and never expose tokens.
        '302':
          description: Redirect to Owner Gmail settings with success or safe error
        '400':
          $ref: '../components/responses.yaml#/components/responses/BadRequest'
  /api/v1/gmail/disconnect:
    post:
      operationId: disconnectGmail
      tags: [Gmail]
      summary: Disconnect Gmail
      description: |
        Revokes best-effort at Google, wipes encrypted credentials, stops polling.
        **Status: Implemented in A5.3.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/GmailDisconnectRequest'
      responses:
        '200':
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/GmailDisconnectResponse'
        '400':
          $ref: '../components/responses.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../components/responses.yaml#/components/responses/NotFound'
  /api/v1/gmail/sync:
    post:
      operationId: syncGmail
      tags: [Gmail]
      summary: Trigger manual Gmail sync
      description: |
        Owner-triggered Inbox sync (initial no-backfill cursor or incremental History).
        **Status: Implemented in A5.4.**
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/GmailSyncRequest'
      responses:
        '200':
          description: Sync run started or completed within request
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/GmailSyncResponse'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '409':
          $ref: '../components/responses.yaml#/components/responses/Conflict'
  /api/v1/gmail/sync-runs:
    get:
      operationId: listGmailSyncRuns
      tags: [Gmail]
      summary: List recent Gmail sync runs
      description: |
        Cursor-paginated safe sync-run summaries.
        **Status: Implemented in A5.4.**
      parameters:
        - $ref: '../components/parameters.yaml#/components/parameters/Cursor'
        - $ref: '../components/parameters.yaml#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated sync runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../openapi.yaml#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '../openapi.yaml#/components/schemas/GmailSyncRun'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
  /api/v1/internal/gmail/poll:
    get:
      operationId: pollGmailInternalGet
      tags: [Gmail]
      summary: Internal scheduled Gmail poll (Vercel Cron)
      description: |
        Bodyless cron poll for eligible accounts. Uses system audit attribution (D074).
        Requires `InternalCronBearer` (configured `CRON_SECRET`). Not an Owner session.
        **GET is the Vercel Cron entrypoint** (platform issues GET). This is a
        secret-authenticated internal scheduler action — not a public Recipient
        capability route and must not be copied as a pattern for public GET mutations.
        Never initializes History cursors (Owner manual sync only). Processes at most
        three eligible accounts sequentially with existing A5.4 per-account bounds.
        **Status: Implemented in A5.5.**
      security:
        - InternalCronBearer: []
      responses:
        '200':
          description: Poll aggregate result
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/GmailPollResponse'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '500':
          $ref: '../components/responses.yaml#/components/responses/InternalError'
    post:
      operationId: pollGmailInternal
      tags: [Gmail]
      summary: Internal scheduled Gmail poll (operator)
      description: |
        Same handler as GET. POST exists for controlled operator testing with
        `Authorization: Bearer <CRON_SECRET>`. Uses system audit attribution (D074).
        Not an Owner session. Never initializes History cursors.
        **Status: Implemented in A5.5.**
      security:
        - InternalCronBearer: []
      responses:
        '200':
          description: Poll aggregate result
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/GmailPollResponse'
        '401':
          $ref: '../components/responses.yaml#/components/responses/Unauthorized'
        '500':
          $ref: '../components/responses.yaml#/components/responses/InternalError'
