name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts validate, generate, drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contract validate
        run: pnpm contracts:validate

      - name: Contract generate
        run: pnpm contracts:generate

      - name: Contract drift check
        run: pnpm contracts:check-drift

      - name: Contract tests
        run: pnpm test:contracts

  domain:
    name: Domain lint, test, build
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts for domain enum parity tests
        run: pnpm contracts:generate

      - name: Domain lint
        run: pnpm --filter @aicaa/domain lint

      - name: Domain tests
        run: pnpm test:domain

      - name: Domain build
        run: pnpm build:domain

  web:
    name: Web format, lint, test, build
    runs-on: ubuntu-latest
    needs: [contracts, domain]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts for domain enum parity tests
        run: pnpm contracts:generate

      - name: Build domain package for web imports
        run: pnpm build:domain

      - name: Format check
        run: pnpm format:check
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OWNER_WORKSPACE_DOMAIN: example.com
          OWNER_ORGANIZATION_ID: org_ci_test

      - name: Lint
        run: pnpm lint

      - name: Web tests
        run: pnpm test:web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OWNER_WORKSPACE_DOMAIN: example.com
          OWNER_ORGANIZATION_ID: org_ci_test

      - name: Web production build
        run: pnpm build:web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OWNER_WORKSPACE_DOMAIN: example.com
          OWNER_ORGANIZATION_ID: org_ci_test

  android:
    name: Android ktlint, unit tests, api-contract, debug build
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Kotlin contract models
        run: pnpm contracts:generate

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Android ktlint
        working-directory: apps/android
        run: ./gradlew ktlintCheck --no-daemon

      - name: Android unit tests
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Android api-contract compile
        working-directory: apps/android
        run: ./gradlew :api-contract:compileDebugKotlin --no-daemon

      - name: Android debug build
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon
